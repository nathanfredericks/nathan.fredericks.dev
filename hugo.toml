baseURL = 'https://nathan.fredericks.dev/'
languageCode = 'en-us'
title = 'Nathan Fredericks | Computer Science student'
theme = 'portfolio'
disableKinds = ['taxonomy', 'term']

[params]
  description = "Hello! My name's Nathan. I'm a Computer Science student at Acadia University."

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
  [[module.mounts]]
    source = 'static'
    target = 'static'
